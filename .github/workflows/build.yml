name: Build MobileGlues-Adreno for Android

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug, Release]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Init required submodules (skip perfetto)
        run: |
          git submodule update --init -- \
            MobileGlues-cpp/3rdparty/xxhash \
            MobileGlues-cpp/3rdparty/glm \
            MobileGlues-cpp/include/FastSTL \
            MobileGlues-cpp/3rdparty/glslang \
            MobileGlues-cpp/3rdparty/SPIRV-Cross

      - name: Setup Android NDK r26d
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d
          add-to-path: false

      - name: Cache CMake build directory
        uses: actions/cache@v4
        with:
          path: MobileGlues-cpp/build-android-${{ matrix.build_type }}
          key: cmake-android-arm64-${{ matrix.build_type }}-${{ hashFiles('MobileGlues-cpp/CMakeLists.txt', 'MobileGlues-cpp/**/*.cpp', 'MobileGlues-cpp/**/*.h') }}
          restore-keys: |
            cmake-android-arm64-${{ matrix.build_type }}-

      - name: Configure CMake
        run: |
          cmake -S MobileGlues-cpp \
                -B MobileGlues-cpp/build-android-${{ matrix.build_type }} \
                -DCMAKE_TOOLCHAIN_FILE=${{ steps.setup-ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake \
                -DANDROID_ABI=arm64-v8a \
                -DANDROID_PLATFORM=android-26 \
                -DANDROID_STL=c++_static \
                -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

      - name: Build
        run: |
          cmake --build MobileGlues-cpp/build-android-${{ matrix.build_type }} \
                --target mobileglues \
                -j$(nproc)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libmobileglues-android-arm64-${{ matrix.build_type }}
          path: MobileGlues-cpp/build-android-${{ matrix.build_type }}/libmobileglues.so

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-android
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Release artifact
        uses: actions/download-artifact@v4
        with:
          name: libmobileglues-android-arm64-Release
          path: release-artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/libmobileglues.so
          generate_release_notes: true
